# LLM provider configuration, follow https://docs.litellm.ai/docs/providers for your own provider config
llm:
  provider: openai              # Options: openai, anthropic, minimax, etc.
  model: gpt-5                 # Model to use for generation, follow litellm model field
  api_key: sk-your-openai-api-key-here  # WARNING: Replace with your actual key, never commit real keys!
  base_url: null               # Optional: Custom API endpoint (http:// or https://)
  temperature: 0.7
  max_tokens: 2048

default_agent: Qu

# Context compaction configuration.
# The default value is 80% of a 200k-token context window.
context:
  token_threshold: 160000

# Heartbeat is a silent periodic background turn for ongoing awareness.
# It is disabled by default to avoid automatic LLM calls.
heartbeat:
  interval_minutes: 0
  agent: null

# Channel configuration for serving the agent through messaging platforms.
# To enable channels, set channels.enabled=true and enable at least one platform below.
channels:
  enabled: false

  telegram:
    enabled: false
    bot_token: your-telegram-bot-token-here
    allowed_user_ids:
      - "123456789"            # Telegram user ID or chat ID allowed to talk to the agent

  discord:
    enabled: false
    bot_token: your-discord-bot-token-here
    channel_id: "123456789012345678"  # Optional: restrict the bot to one Discord channel
    allowed_user_ids:
      - "123456789012345678"   # Discord user ID allowed to talk to the agent

# WebSocket gateway for programmatic access.
# Clients send JSON with source/content only; the server owns source -> session_id mapping.
# Keep host on 127.0.0.1 for local use. If exposing it beyond localhost, set auth_token.
websocket:
  enabled: false
  host: 127.0.0.1
  port: 6948
  path: /ws
  auth_token: null


