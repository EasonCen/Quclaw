<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1120" viewBox="0 0 1500 1120" role="img" aria-labelledby="title desc">
  <title id="title">Quclaw current runtime architecture</title>
  <desc id="desc">Event-driven runtime flow across CLI, platform channels, EventBus, AgentWorker, AgentSession, DeliveryWorker, and configuration hot reload.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#273444"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1f6feb"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1a7f37"/>
    </marker>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font: 700 34px "Segoe UI", Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 15px "Segoe UI", Arial, sans-serif; fill: #5a6678; }
      .lane-title { font: 700 18px "Segoe UI", Arial, sans-serif; fill: #273444; }
      .box-title { font: 700 17px "Segoe UI", Arial, sans-serif; fill: #152238; }
      .box-text { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #354255; }
      .small { font: 400 12px "Segoe UI", Arial, sans-serif; fill: #596579; }
      .code { font: 600 12px Consolas, "SFMono-Regular", Menlo, monospace; fill: #2f3b52; }
      .lane { fill: #ffffff; stroke: #d8dee9; stroke-width: 1.4; }
      .input { fill: #fff7e6; stroke: #d29922; stroke-width: 1.8; }
      .event { fill: #eef6ff; stroke: #1f6feb; stroke-width: 1.8; }
      .worker { fill: #eefcf3; stroke: #1a7f37; stroke-width: 1.8; }
      .session { fill: #f3efff; stroke: #8250df; stroke-width: 1.8; }
      .state { fill: #fff1f3; stroke: #cf222e; stroke-width: 1.8; }
      .note { fill: #f6f8fa; stroke: #afb8c1; stroke-width: 1.4; }
      .arrow { fill: none; stroke: #273444; stroke-width: 2.4; marker-end: url(#arrow); }
      .arrow-blue { fill: none; stroke: #1f6feb; stroke-width: 2.4; marker-end: url(#arrow-blue); }
      .arrow-green { fill: none; stroke: #1a7f37; stroke-width: 2.4; marker-end: url(#arrow-green); }
      .dash { fill: none; stroke: #6e7781; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .label { font: 700 12px "Segoe UI", Arial, sans-serif; fill: #273444; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="1120"/>

  <text class="title" x="60" y="62">Quclaw Runtime Architecture</text>
  <text class="subtitle" x="60" y="88">Current event-driven flow: inputs publish InboundEvent, workers execute asynchronously, responses return as OutboundEvent.</text>

  <rect class="lane" x="45" y="125" width="1410" height="170" rx="18"/>
  <text class="lane-title" x="70" y="158">Input Layer</text>

  <rect class="input" x="90" y="185" width="210" height="78" rx="12"/>
  <text class="box-title" x="115" y="215">CLI ChatLoop</text>
  <text class="box-text" x="115" y="238">local terminal input</text>
  <text class="code" x="115" y="256">CliEventSource</text>

  <rect class="input" x="385" y="185" width="250" height="78" rx="12"/>
  <text class="box-title" x="410" y="215">TelegramChannel</text>
  <text class="box-text" x="410" y="238">python-telegram-bot</text>
  <text class="code" x="410" y="256">TelegramEventSource</text>

  <rect class="input" x="705" y="185" width="250" height="78" rx="12"/>
  <text class="box-title" x="730" y="215">DiscordChannel</text>
  <text class="box-text" x="730" y="238">discord.py client</text>
  <text class="code" x="730" y="256">DiscordEventSource</text>

  <rect class="worker" x="1035" y="180" width="325" height="90" rx="12"/>
  <text class="box-title" x="1060" y="210">ChannelWorker</text>
  <text class="box-text" x="1060" y="233">runs configured platform channels</text>
  <text class="box-text" x="1060" y="252">binds source -> session_id with lock</text>

  <path class="arrow-green" d="M635 224 L1030 224"/>
  <path class="arrow-green" d="M955 224 L1030 224"/>

  <rect class="lane" x="45" y="335" width="1410" height="225" rx="18"/>
  <text class="lane-title" x="70" y="368">Event Layer</text>

  <rect class="event" x="90" y="405" width="285" height="95" rx="12"/>
  <text class="box-title" x="115" y="435">InboundEvent</text>
  <text class="code" x="115" y="458">session_id, request_id</text>
  <text class="code" x="115" y="476">source, content</text>

  <rect class="event" x="485" y="392" width="270" height="118" rx="12"/>
  <text class="box-title" x="510" y="424">EventBus</text>
  <text class="box-text" x="510" y="448">async queue + typed subscribers</text>
  <text class="box-text" x="510" y="470">routes InboundEvent/OutboundEvent</text>
  <text class="small" x="510" y="492">does not know LLM or platforms</text>

  <rect class="event" x="865" y="405" width="295" height="95" rx="12"/>
  <text class="box-title" x="890" y="435">OutboundEvent</text>
  <text class="code" x="890" y="458">same session_id/request_id</text>
  <text class="code" x="890" y="476">same source + response/error</text>

  <path class="arrow-blue" d="M195 263 C195 322, 225 350, 225 398"/>
  <text class="label" x="115" y="332">CLI publish</text>
  <path class="arrow-green" d="M1198 270 C1198 337, 1030 354, 1030 398"/>
  <text class="label" x="1115" y="333">platform publish</text>
  <path class="arrow-blue" d="M375 452 L480 452"/>
  <path class="arrow-blue" d="M755 452 L860 452"/>

  <rect class="lane" x="45" y="600" width="1410" height="235" rx="18"/>
  <text class="lane-title" x="70" y="633">Execution Layer</text>

  <rect class="worker" x="105" y="675" width="300" height="105" rx="12"/>
  <text class="box-title" x="130" y="707">AgentWorker</text>
  <text class="box-text" x="130" y="730">subscribes InboundEvent</text>
  <text class="box-text" x="130" y="750">creates background task</text>
  <text class="box-text" x="130" y="770">per-session asyncio.Lock</text>

  <rect class="session" x="535" y="675" width="300" height="105" rx="12"/>
  <text class="box-title" x="560" y="707">AgentSession</text>
  <text class="box-text" x="560" y="730">LLM conversation loop</text>
  <text class="box-text" x="560" y="750">tool calls + context compaction</text>
  <text class="box-text" x="560" y="770">history-backed SessionState</text>

  <rect class="session" x="965" y="675" width="300" height="105" rx="12"/>
  <text class="box-title" x="990" y="707">LLM + Tools</text>
  <text class="box-text" x="990" y="730">LLMProvider.from_config</text>
  <text class="box-text" x="990" y="750">ToolRegistry builtins/web/skills</text>
  <text class="box-text" x="990" y="770">returns text or tool calls</text>

  <path class="arrow-blue" d="M620 510 C620 600, 255 585, 255 668"/>
  <text class="label" x="332" y="582">dispatch InboundEvent</text>
  <path class="arrow-green" d="M405 727 L530 727"/>
  <text class="label" x="432" y="710">session.chat()</text>
  <path class="arrow-green" d="M835 727 L960 727"/>
  <path class="arrow-green" d="M965 758 C900 820, 585 820, 685 780"/>
  <text class="label" x="870" y="810">tool loop</text>
  <path class="arrow-blue" d="M255 675 C255 560, 1010 590, 1010 505"/>
  <text class="label" x="680" y="586">publish OutboundEvent</text>

  <rect class="lane" x="45" y="875" width="1410" height="150" rx="18"/>
  <text class="lane-title" x="70" y="908">Delivery + State</text>

  <rect class="worker" x="110" y="935" width="300" height="72" rx="12"/>
  <text class="box-title" x="135" y="965">DeliveryWorker</text>
  <text class="box-text" x="135" y="987">background delivery tasks + retry</text>

  <rect class="input" x="535" y="935" width="300" height="72" rx="12"/>
  <text class="box-title" x="560" y="965">Platform Reply</text>
  <text class="box-text" x="560" y="987">channel.reply(content, source)</text>

  <rect class="state" x="970" y="925" width="355" height="92" rx="12"/>
  <text class="box-title" x="995" y="955">Runtime State</text>
  <text class="box-text" x="995" y="978">history store: session messages</text>
  <text class="box-text" x="995" y="998">config.runtime.yaml: source -> session_id</text>

  <path class="arrow-blue" d="M1012 500 C1012 878, 260 810, 260 928"/>
  <text class="label" x="315" y="876">DeliveryWorker subscribes OutboundEvent</text>
  <path class="arrow-green" d="M410 971 L530 971"/>
  <path class="dash" d="M1135 925 C1120 830, 1010 800, 835 764"/>
  <text class="label" x="1010" y="862">load/save history</text>
  <path class="dash" d="M1148 925 C1140 690, 1220 405, 1200 270"/>
  <text class="label" x="1172" y="612">source affinity</text>

  <rect class="note" x="1045" y="360" width="330" height="130" rx="12"/>
  <text class="box-title" x="1070" y="390">Config Hot Reload</text>
  <text class="box-text" x="1070" y="414">watch config.user.yaml</text>
  <text class="box-text" x="1070" y="436">merge user + runtime config</text>
  <text class="box-text" x="1070" y="458">AgentWorker.clear_sessions()</text>
  <text class="small" x="1070" y="480">current request continues, next one rebuilds</text>

  <path class="dash" d="M1205 490 C1205 585, 405 580, 350 675"/>

  <rect class="note" x="60" y="1045" width="1380" height="45" rx="10"/>
  <text class="small" x="85" y="1073">Startup order: EventBus -> DeliveryWorker -> AgentWorker -> ChannelWorker. Shutdown order: ChannelWorker -> AgentWorker -> DeliveryWorker -> EventBus.</text>
</svg>
