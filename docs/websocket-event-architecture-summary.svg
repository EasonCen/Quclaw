<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Quclaw WebSocket and event-driven architecture summary</title>
  <desc id="desc">Architecture summary showing external clients, adapters, EventBus, Agent routing, AgentSession execution, delivery paths, and persisted state.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#273444"/>
    </marker>
    <marker id="blueArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1f6feb"/>
    </marker>
    <marker id="greenArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1a7f37"/>
    </marker>
    <marker id="redArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#cf222e"/>
    </marker>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font: 700 34px "Segoe UI", Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 15px "Segoe UI", Arial, sans-serif; fill: #5a6678; }
      .section-title { font: 700 17px "Segoe UI", Arial, sans-serif; fill: #273444; }
      .box-title { font: 700 16px "Segoe UI", Arial, sans-serif; fill: #152238; }
      .box-text { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #354255; }
      .tiny { font: 400 12px "Segoe UI", Arial, sans-serif; fill: #596579; }
      .code { font: 600 12px Consolas, "SFMono-Regular", Menlo, monospace; fill: #2f3b52; }
      .lane { fill: #ffffff; stroke: #d8dee9; stroke-width: 1.5; }
      .client { fill: #fff8e8; stroke: #bf8700; stroke-width: 1.8; }
      .adapter { fill: #eef6ff; stroke: #1f6feb; stroke-width: 1.8; }
      .bus { fill: #f0f5ff; stroke: #57606a; stroke-width: 2.2; }
      .worker { fill: #eefcf3; stroke: #1a7f37; stroke-width: 1.8; }
      .agent { fill: #f4f0ff; stroke: #8250df; stroke-width: 1.8; }
      .state { fill: #fff1f3; stroke: #cf222e; stroke-width: 1.8; }
      .future { fill: #f6f8fa; stroke: #6e7781; stroke-width: 1.6; stroke-dasharray: 8 6; }
      .note { fill: #ffffff; stroke: #afb8c1; stroke-width: 1.3; }
      .arrow { fill: none; stroke: #273444; stroke-width: 2.4; marker-end: url(#arrow); }
      .arrow-blue { fill: none; stroke: #1f6feb; stroke-width: 2.4; marker-end: url(#blueArrow); }
      .arrow-green { fill: none; stroke: #1a7f37; stroke-width: 2.4; marker-end: url(#greenArrow); }
      .arrow-red { fill: none; stroke: #cf222e; stroke-width: 2.2; marker-end: url(#redArrow); }
      .dash { fill: none; stroke: #6e7781; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .label { font: 700 12px "Segoe UI", Arial, sans-serif; fill: #273444; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1100"/>
  <text class="title" x="60" y="60">Quclaw Event Architecture Summary</text>
  <text class="subtitle" x="60" y="88">Current WebSocket stage: adapters create EventSource + InboundEvent, EventBus routes work, AgentWorker runs sessions, responders deliver by original source.</text>

  <rect class="lane" x="45" y="120" width="300" height="800" rx="10"/>
  <text class="section-title" x="70" y="152">External inputs</text>

  <rect class="client" x="75" y="185" width="240" height="105" rx="8"/>
  <text class="box-title" x="95" y="215">WebSocket client</text>
  <text class="box-text" x="95" y="240">wscat / browser / app</text>
  <text class="code" x="95" y="265">{source, content}</text>

  <rect class="client" x="75" y="330" width="240" height="105" rx="8"/>
  <text class="box-title" x="95" y="360">CLI</text>
  <text class="box-text" x="95" y="385">Interactive local chat</text>
  <text class="code" x="95" y="410">platform-cli:cli-user/*</text>

  <rect class="client" x="75" y="475" width="240" height="120" rx="8"/>
  <text class="box-title" x="95" y="505">Telegram / Discord</text>
  <text class="box-text" x="95" y="530">Mobile messaging platforms</text>
  <text class="code" x="95" y="555">platform-telegram:chat</text>
  <text class="code" x="95" y="578">platform-discord:channel/user</text>

  <rect class="note" x="75" y="650" width="240" height="150" rx="8"/>
  <text class="box-title" x="95" y="680">Source contract</text>
  <text class="box-text" x="95" y="705">source = reply address</text>
  <text class="box-text" x="95" y="730">session_id = continuity</text>
  <text class="box-text" x="95" y="755">agent_id = router/history</text>
  <text class="tiny" x="95" y="782">WebSocket clients never choose session_id.</text>

  <rect class="lane" x="380" y="120" width="345" height="800" rx="10"/>
  <text class="section-title" x="405" y="152">Adapters</text>

  <rect class="adapter" x="415" y="185" width="275" height="150" rx="8"/>
  <text class="box-title" x="435" y="215">WebSocketWorker</text>
  <text class="box-text" x="435" y="240">FastAPI / uvicorn endpoint</text>
  <text class="box-text" x="435" y="265">Validates JSON and sends accepted first</text>
  <text class="code" x="435" y="290">platform-ws:&lt;source&gt;</text>
  <text class="tiny" x="435" y="315">One connection may subscribe to many sources.</text>

  <rect class="adapter" x="415" y="375" width="275" height="150" rx="8"/>
  <text class="box-title" x="435" y="405">ChannelWorker</text>
  <text class="box-text" x="435" y="430">Runs CLI, Telegram, Discord channels</text>
  <text class="box-text" x="435" y="455">Creates InboundEvent from platform input</text>
  <text class="tiny" x="435" y="480">Each source maps to a stable session_id.</text>

  <rect class="state" x="415" y="570" width="275" height="145" rx="8"/>
  <text class="box-title" x="435" y="600">Runtime source map</text>
  <text class="code" x="435" y="625">config.runtime.yaml</text>
  <text class="box-text" x="435" y="650">source -&gt; session_id</text>
  <text class="box-text" x="435" y="675">Created by adapters</text>
  <text class="tiny" x="435" y="700">The server owns session identity.</text>

  <rect class="lane" x="760" y="120" width="260" height="800" rx="10"/>
  <text class="section-title" x="785" y="152">Event core</text>

  <rect class="bus" x="800" y="250" width="180" height="300" rx="18"/>
  <text class="box-title" x="838" y="285">EventBus</text>
  <text class="box-text" x="830" y="320">Async pub/sub</text>
  <text class="box-text" x="830" y="348">Typed events</text>
  <text class="box-text" x="830" y="376">Subscribers fan out</text>
  <line x1="825" y1="405" x2="955" y2="405" stroke="#d0d7de" stroke-width="1"/>
  <text class="code" x="822" y="435">InboundEvent</text>
  <text class="code" x="822" y="462">OutboundEvent</text>
  <text class="tiny" x="822" y="500">Outbox persists only offline</text>
  <text class="tiny" x="822" y="522">delivery platforms.</text>

  <rect class="future" x="790" y="620" width="200" height="120" rx="8"/>
  <text class="box-title" x="815" y="650">Future Router</text>
  <text class="box-text" x="815" y="675">source policy</text>
  <text class="box-text" x="815" y="700">session history</text>
  <text class="box-text" x="815" y="725">content-based routing</text>

  <rect class="lane" x="1055" y="120" width="250" height="800" rx="10"/>
  <text class="section-title" x="1080" y="152">Agent execution</text>

  <rect class="worker" x="1085" y="205" width="190" height="125" rx="8"/>
  <text class="box-title" x="1105" y="235">AgentWorker</text>
  <text class="box-text" x="1105" y="260">Routes by session</text>
  <text class="box-text" x="1105" y="285">Creates/resumes AgentSession</text>
  <text class="tiny" x="1105" y="310">Current: default_agent or history.</text>

  <rect class="agent" x="1085" y="385" width="190" height="140" rx="8"/>
  <text class="box-title" x="1105" y="415">AgentSession</text>
  <text class="box-text" x="1105" y="440">Prompt assembly</text>
  <text class="box-text" x="1105" y="465">LLM + tool loop</text>
  <text class="box-text" x="1105" y="490">Context compaction</text>
  <text class="tiny" x="1105" y="515">Writes conversation history.</text>

  <rect class="state" x="1085" y="585" width="190" height="135" rx="8"/>
  <text class="box-title" x="1105" y="615">HistoryStore</text>
  <text class="code" x="1105" y="640">.history/index.jsonl</text>
  <text class="box-text" x="1105" y="665">session_id -&gt; agent_id</text>
  <text class="box-text" x="1105" y="690">session messages</text>

  <rect class="lane" x="1340" y="120" width="215" height="800" rx="10"/>
  <text class="section-title" x="1365" y="152">Responses</text>

  <rect class="adapter" x="1365" y="205" width="165" height="125" rx="8"/>
  <text class="box-title" x="1385" y="235">WebSocket push</text>
  <text class="box-text" x="1385" y="260">Online fan-out</text>
  <text class="box-text" x="1385" y="285">No outbox retry</text>
  <text class="tiny" x="1385" y="310">Matches original ws source.</text>

  <rect class="worker" x="1365" y="385" width="165" height="145" rx="8"/>
  <text class="box-title" x="1385" y="415">DeliveryWorker</text>
  <text class="box-text" x="1385" y="440">Telegram / Discord</text>
  <text class="box-text" x="1385" y="465">Chunking + retry</text>
  <text class="box-text" x="1385" y="490">Ack after success</text>

  <rect class="state" x="1365" y="585" width="165" height="125" rx="8"/>
  <text class="box-title" x="1385" y="615">Outbox</text>
  <text class="code" x="1385" y="640">.event/outbound</text>
  <text class="box-text" x="1385" y="665">Crash recovery</text>
  <text class="tiny" x="1385" y="690">Not used for ws/cli.</text>

  <path class="arrow-blue" d="M315,238 C350,238 370,238 415,238"/>
  <path class="arrow-blue" d="M315,382 C350,382 370,440 415,440"/>
  <path class="arrow-blue" d="M315,535 C350,535 370,455 415,455"/>

  <path class="arrow-blue" d="M690,260 C735,260 755,325 800,325"/>
  <path class="arrow-blue" d="M690,450 C735,450 755,390 800,390"/>
  <path class="dash" d="M552,570 L552,525"/>
  <path class="dash" d="M690,642 C735,642 755,520 800,500"/>

  <path class="arrow-green" d="M980,325 C1015,325 1045,268 1085,268"/>
  <path class="arrow" d="M1180,330 L1180,385"/>
  <path class="dash" d="M1180,525 L1180,585"/>
  <path class="dash" d="M990,680 C1030,680 1045,265 1085,265"/>

  <path class="arrow-green" d="M1275,452 C1305,452 1330,260 1365,260"/>
  <path class="arrow-green" d="M1275,452 C1305,452 1330,455 1365,455"/>
  <path class="dash" d="M1448,530 L1448,585"/>

  <path class="arrow-red" d="M1365,260 C1300,260 1270,205 1268,205 C1160,110 620,110 515,185"/>
  <text class="label" x="1040" y="105">OutboundEvent keeps original source</text>

  <rect class="note" x="60" y="955" width="1480" height="95" rx="10"/>
  <text class="box-title" x="85" y="985">Design invariants</text>
  <text class="box-text" x="85" y="1013">1. Adapters never choose agent_id; they only turn external messages into typed events.</text>
  <text class="box-text" x="530" y="1013">2. WebSocket source/content is the whole client protocol; the server owns source -&gt; session_id.</text>
  <text class="box-text" x="1080" y="1013">3. Multi-agent routing belongs after EventBus, not inside WebSocket.</text>
  <text class="box-text" x="85" y="1038">4. OutboundEvent.source is a delivery address; history/session metadata decide which agent owns the conversation.</text>
</svg>
